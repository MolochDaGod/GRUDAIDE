name: GRUDAIDE - AI Worker CI/CD

on:
  push:
    branches: [master, "copilot/**"]
    paths:
      - "grudaide/**"
  pull_request:
    branches: [master]
    paths:
      - "grudaide/**"
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Target deployment environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - staging
          - production

concurrency:
  group: grudaide-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

defaults:
  run:
    working-directory: grudaide

jobs:
  # ── Lint & Type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grudaide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (src + tests)
        run: npx tsc --project tsconfig.test.json

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grudaide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: grudaide/coverage/
          retention-days: 7

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grudaide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: grudaide-dist
          path: grudaide/dist/
          retention-days: 7

  # ── Deploy Workers ────────────────────────────────────────────────────────
  deploy:
    name: Deploy Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    permissions:
      contents: read
      deployments: write
    if: |
      github.ref == 'refs/heads/master' ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.deploy_env || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: grudaide/package-lock.json

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: grudaide-dist
          path: grudaide/dist/

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Deploy GRUDAIDE workers
        env:
          GITHUB_APP_ID: ${{ secrets.GRUDAIDE_APP_ID }}
          GITHUB_PRIVATE_KEY: ${{ secrets.GRUDAIDE_PRIVATE_KEY }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GRUDAIDE_WEBHOOK_SECRET }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          NODE_ENV: ${{ github.event.inputs.deploy_env || 'development' }}
          LOG_LEVEL: info
          LOG_FORMAT: json
        run: |
          echo "Deploying GRUDAIDE workers to $NODE_ENV"
          node dist/app.js &
          sleep 5
          curl -sf http://localhost:3000/health || exit 1
          echo "Health check passed — workers deployed"
